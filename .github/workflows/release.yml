name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest        # Apple Silicon (arm64)
            args: '--target aarch64-apple-darwin'
          - platform: macos-15-intel      # Intel (x86_64) — replaces deprecated macos-13
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest      # Windows 10/11 x64
            args: ''

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: control-app

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.platform == 'macos-15-intel' && 'x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: control-app/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: control-app/package-lock.json

      - run: npm ci

      - name: Build & upload to a draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: control-app
          tagName: ${{ github.ref_name }}
          releaseName: 'Zephyros ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
